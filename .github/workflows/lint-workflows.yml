---
# Lint every workflow under `.github/workflows/` via actionlint,
# delegated to the reusable workflow in proofhouse/github-actions. The
# shared workflow runs actionlint from its SHA-pinned Docker image (which
# bundles shellcheck) against this repo's checkout, so the lint gate no
# longer carries its own Go-toolchain + `go tool actionlint` setup. The
# job still fires on every PR that touches a workflow file and on every
# push to `main`, guarding both ends of the integration path.
#
# Caller-level concurrency is deliberately omitted: the reusable workflow
# already declares `group: ${{ github.workflow }}-${{ github.ref }}`,
# which evaluates in this caller's context (so it still cancels
# superseded PR runs). Repeating the same group here would make the run
# share a concurrency group with itself and deadlock.
#
# The matching local entrypoint is `just lint-workflows`, which runs the
# same pinned image. Renovate bumps the caller ref below and the Justfile
# image pin along the same path it walks for every other digest.

name: lint-workflows

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  pull_request:
    paths: ['.github/workflows/**']

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/lint-workflows.yml@ffc278f8a5826e61763eb837bb5bc2199a26b86b # v0.2.2
